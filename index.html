<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI災害予測 リアルタイム連動マップ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 10px; font-family: sans-serif; }
        #map { height: 400px; width: 100%; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .legend { background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
        .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.7; }
        .control-panel { text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="control-panel">
        <h3>🚨 AI災害予測 リアルタイム連動画面</h3>
    </div>
    
    <div id="map"></div>

    <script>
        // 地図の基本設定
        const map = L.map('map').setView([34.9717, 138.3888], 14);
        L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
            attribution: '&copy; 国土地理院'
        }).addTo(map);

        let currentMarker = null;

        function updateMap(level, rainfall, temp, wind, timeStr) {
            if (currentMarker) map.removeLayer(currentMarker);
            
            const colors = ['#3388ff', '#ffcc00', '#ff4d4d'];
            const levelTexts = ['安全 (Level 0)', '注意 (Level 1)', '危険 (Level 2)'];

            currentMarker = L.circleMarker([34.9717, 138.3888], {
                radius: 22, fillColor: colors[level], color: '#fff', weight: 3, fillOpacity: 0.8
            }).addTo(map);

            currentMarker.bindPopup(`
                <b>静岡駅周辺</b><br>
                🤖 危険度: ${levelTexts[level]}<br>
                💧 降水: ${rainfall}mm | 🌡️ 気温: ${temp}℃<br>
                🌀 風速: ${wind}m/s<br>
                ⏱️ 更新: ${timeStr}
            `).openPopup();
        }

        // データの自動読み込み
        async function loadData() {
            try {
                const response = await fetch('https://api.jsonbin.io/v3/b/6a4e0c4fda38895dfe3f4207/latest', {
                    headers: { 'X-Master-Key': '$2a$10$2Gloi/T10XfC76Ca6vIQn.hIzvhlkUwSE3n0NtJ4GLl/yeNGL0dWi' }
                });
                const res = await response.json();
                const d = res.record;
                updateMap(d.danger_level, d.rainfall, d.temperature, d.wind, d.updated_at);
            } catch (e) {
                console.error("読み込み失敗", e);
            }
        }

        loadData();
        
        // 凡例
        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = () => {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = '<h4>危険度</h4><i style="background:#ff4d4d"></i>危険<br><i style="background:#ffcc00"></i>注意<br><i style="background:#3388ff"></i>安全';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
