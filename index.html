<script>
    // 地図の初期設定
    const map = L.map('map').setView([34.9717, 138.3888], 14);
    L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://maps.gsi.go.jp/development/ichiran.html">国土地理院</a>'
    }).addTo(map);

    let currentMarker = null;

    function getColor(level) {
        if (level === 2) return '#ff4d4d';
        if (level === 1) return '#ffcc00';
        return '#3388ff';
    }

    // 地図のピンを更新する関数
    function updateMap(level, rainfall, temp, wind, timeStr) {
        if (currentMarker) {
            map.removeLayer(currentMarker);
        }

        currentMarker = L.circleMarker([34.9717, 138.3888], {
            radius: 22,
            fillColor: getColor(level),
            color: '#fff',
            weight: 3,
            fillOpacity: 0.85
        }).addTo(map);

        const levelTexts = [
            '<b style="color:blue;">安全 (Level 0)</b>', 
            '<b style="color:orange;">注意 (Level 1)</b>', 
            '<b style="color:red;">危険 (Level 2)</b>'
        ];

        currentMarker.bindPopup(`
            <b style="font-size:1.1em;">静岡駅周辺エリア</b><br><br>
            🤖 <b>AI予測危険度: ${levelTexts[level]}</b><br>
            💧 降水量: ${rainfall} mm<br>
            🌡️ 気温: ${temp} ℃<br>
            🌀 風速: ${wind} m/s<br><br>
            <small style="color:green;">⏱️ AI予測時刻: ${timeStr}</small><br>
            <small style="color:gray;">状態: リアルタイムデータ自動取得 🟢</small>
        `).openPopup();
    }

    // 🌟 JSONBinから最新のAI予測データを自動で取ってくる関数
    async function loadLatestData() {
        const BIN_ID = '6a4e0c4fda38895dfe3f4207';
        const API_KEY = '$2a$10$2Gloi/T10XfC76Ca6vIQn.hIzvhlkUwSE3n0NtJ4GLl/yeNGL0dWi'; 
        const url = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;

        try {
            const response = await fetch(url, {
                headers: { 'X-Master-Key': API_KEY }
            });
            const resData = await response.json();
            const data = resData.record; // ここに保存したデータが入ってる

            // 地図に最新データを反映！
            updateMap(data.danger_level, data.rainfall, data.temperature, data.wind, data.updated_at);
        } catch (error) {
            console.error("データの読み込みに失敗しました:", error);
        }
    }

    // ページを開いた瞬間に自動実行
    loadLatestData();

    // 凡例の追加
    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = function () {
        const div = L.DomUtil.create('div', 'legend');
        div.innerHTML += '<h4>危険度</h4>';
        div.innerHTML += '<i style="background: #ff4d4d"></i> 危険 (Level 2)<br>';
        div.innerHTML += '<i style="background: #ffcc00"></i> 注意 (Level 1)<br>';
        div.innerHTML += '<i style="background: #3388ff"></i> 安全 (Level 0)<br>';
        return div;
    };
    legend.addTo(map);
</script>
